# Practical-rate production template: rate~0.9 / 4KB-sector FSR.
#
# This is the expensive version. It derives num_frames from:
#   sector_bits * sector_count_target / LDPC.k
#
# Run after the pilot config is confirmed:
#   tdmr2d rate-plan configs/concat_ldpc_2dmtr_highrate_k15_sector_10k.yaml
#   tdmr2d concat configs/concat_ldpc_2dmtr_highrate_k15_sector_10k.yaml
experiment:
  name: concat_ldpc_2dmtr_highrate_k15_sector_10k
  family: mtr2d_8x2
  seed: 0
  num_tracks: 40
  bits_per_track: 2048

code:
  type: mtr2d_8x2
  block_shape: [8, 2]
  K: 15
  down_mtr: 3
  max_checker_run: 1
  inner_encoder: blockwise
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.10
  c_cross_down: 0.10
  snr_db: 10
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

rate_plan:
  target_total_rate: 0.90
  sector_bits: 32768
  sector_count_target: 10000
  exact_ldpc_rate: false
  check_codebook: true

ldpc:
  n: 1800
  dv: 3
  dc: 75
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  sector_bits: 32768
  sector_count_target: 10000
  inner_demapper: hard_codebook
  turbo_iterations: 0
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64
  channel_detector: soft_awgn

sweep:
  snr_db: [8, 10, 12, 14]
  iti_coeffs: [0.0, 0.2]
