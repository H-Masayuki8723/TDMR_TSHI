# High-rate 4KB-sector FSR waterfall scan, nominal ITI=0.2 only.
#
# This is expected to need higher SNR than ITI=0.0. Use the resulting measurable
# FSR points for extrapolation to 1e-8...1e-10:
#
#   tdmr2d fsr-extrapolate outputs/runs \
#     --name-filter highrate_k15_snrscan_iti02 \
#     --targets 1e-8,1e-9,1e-10 \
#     --group-by iti_coeff
experiment:
  name: highrate_k15_snrscan_iti02_500sector
  family: mtr2d_8x2
  seed: 0
  num_tracks: 40
  bits_per_track: 2048

code:
  type: mtr2d_8x2
  block_shape: [8, 2]
  K: 15
  down_mtr: 3
  max_checker_run: 1
  inner_encoder: blockwise
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.20
  c_cross_down: 0.20
  snr_db: 24
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

rate_plan:
  target_total_rate: 0.90
  sector_bits: 32768
  sector_count_target: 500
  exact_ldpc_rate: false
  check_codebook: true

ldpc:
  n: 1800
  dv: 3
  dc: 75
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  sector_bits: 32768
  sector_count_target: 500
  inner_demapper: hard_codebook
  turbo_iterations: 0
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64
  channel_detector: soft_awgn

sweep:
  snr_db: [18, 20, 22, 24, 26, 28, 30]
  iti_coeffs: [0.2]
