# Concatenated outer LDPC + inner 2D-MTR 8x2 with trellis-pruned inner demapping.
#
# This switches the inner demapper from independent blockwise codebook
# marginalization to a SISO/log-MAP block trellis. Adjacent block transitions
# that violate the configured down-track MTR / 2D checkerboard rule are assigned
# zero probability.
#
# Important research note:
#   This config keeps the block-internal 2D-MTR codebook strict, but relaxes
#   the trellis boundary pruning to the assumed physical MTR allowance:
#     boundary_down_mtr: 8
#     boundary_max_checker_run: 8
#   Therefore, check the CSV columns
#     tx_trellis_transition_violations
#     tx_trellis_transition_count
#     tx_trellis_transition_violation_rate
#   before interpreting performance. A nonzero violation rate means the
#   transmitter and pruned trellis decoder are still unmatched.
#
#   tdmr2d concat configs/concat_ldpc_2dmtr_trellis_pruned.yaml
experiment:
  name: concat_ldpc_2dmtr_trellis_pruned
  family: mtr2d_8x2
  seed: 0
  num_tracks: 40
  bits_per_track: 168

code:
  type: mtr2d_8x2
  block_shape: [8, 2]
  K: 14
  down_mtr: 3
  max_checker_run: 0
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.10
  c_cross_down: 0.10
  snr_db: 6
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

ldpc:
  n: 168
  dv: 3
  dc: 6
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  num_frames: 40
  inner_demapper: trellis_pruned
  turbo_iterations: 2
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64

boundary_scan:
  # Scan tighter boundary rules before expensive BER/FSR runs.
  # A useful candidate has:
  #   tx_trellis_transition_violation_rate == 0 in the sampled transmissions
  #   trellis_state_transition_density < 1.0
  # This is still a sampled diagnostic for the current blockwise transmitter,
  # not a formal matched-code guarantee.
  boundary_down_mtr: [3, 4, 5, 6, 7, 8]
  boundary_max_checker_run: [0, 1, 2, 3, 4, 5, 6, 7, 8]
  num_trials: 4

sweep:
  snr_db: [4, 5, 6, 7, 8]
  iti_coeffs: [0.0, 0.2]
