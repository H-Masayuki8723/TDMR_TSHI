# Practical-rate pilot: outer high-rate LDPC + inner 2D-MTR 8x2 K15.
#
# Purpose:
#   quick wiring check for the rate~0.9 / 4KB-sector FSR branch.
#
# Run:
#   tdmr2d rate-plan configs/concat_ldpc_2dmtr_highrate_k15_sector_pilot.yaml
#   tdmr2d concat configs/concat_ldpc_2dmtr_highrate_k15_sector_pilot.yaml
#
# Notes:
#   K15 requires max_checker_run=1 under the current enumerated 8x2 codebook.
#   The demapper is hard_codebook for a fast high-rate baseline. Use
#   exact_codebook only for small diagnostic runs; K15 exact SISO marginalizes
#   32768 candidates per block.
experiment:
  name: concat_ldpc_2dmtr_highrate_k15_sector_pilot
  family: mtr2d_8x2
  seed: 0
  num_tracks: 40
  bits_per_track: 2048

code:
  type: mtr2d_8x2
  block_shape: [8, 2]
  K: 15
  down_mtr: 3
  max_checker_run: 1
  inner_encoder: blockwise
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.10
  c_cross_down: 0.10
  snr_db: 10
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

rate_plan:
  target_total_rate: 0.90
  sector_bits: 32768
  sector_count_target: 1
  exact_ldpc_rate: true
  check_codebook: true

ldpc:
  n: 1800
  dv: 3
  dc: 75
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  sector_bits: 32768
  sector_count_target: 1
  inner_demapper: hard_codebook
  turbo_iterations: 0
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64
  channel_detector: soft_awgn

sweep:
  snr_db: [10]
  iti_coeffs: [0.0, 0.2]
