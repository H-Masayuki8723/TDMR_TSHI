# SNR x ITI sweep over the uncoded baseline.
# Produces ber_vs_snr.png and ber_vs_iti.png. The `sweep.iti_coeffs` values
# override BOTH cross-track taps (c_cross_up = c_cross_down = iti) at each point;
# `sweep.snr_db` overrides channel.snr_db. The static channel.c_cross_* / snr_db
# below are only fallbacks if a sweep list is empty.
#
# Change `family`/`code.type` to mtr1d (+K1) or mtr2d_8x2 (+K) to sweep the
# constrained codes under identical channel conditions.
experiment:
  name: sweep_iti_snr_uncoded
  family: uncoded
  seed: 0
  num_tracks: 64
  bits_per_track: 4096

code:
  type: uncoded
  block_shape: [8, 2]

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.10
  c_cross_down: 0.10
  snr_db: 14
  boundary: zero

detector:
  type: hard_threshold
  threshold: 0.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

sweep:
  snr_db: [8, 10, 12, 14, 16, 18, 20]
  iti_coeffs: [0.00, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30]
