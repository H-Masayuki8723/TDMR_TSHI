# Practical-rate pilot: outer high-rate LDPC + inner 1D-MTR length-16 K15.
#
# Purpose:
#   high-rate 1D baseline with the same inner rate as the 2D K15 branch:
#   inner rate = 15/16 = 0.9375, outer LDPC rate ~= 0.961, total ~= 0.901.
#
# Run:
#   tdmr2d rate-plan configs/concat_ldpc_1dmtr_highrate_k15_sector_pilot.yaml
#   tdmr2d channel-metrics configs/concat_ldpc_1dmtr_highrate_k15_sector_pilot.yaml
#   tdmr2d concat configs/concat_ldpc_1dmtr_highrate_k15_sector_pilot.yaml
experiment:
  name: concat_ldpc_1dmtr_highrate_k15_sector_pilot
  family: mtr1d
  seed: 0
  num_tracks: 40
  bits_per_track: 2048

code:
  type: mtr1d
  block_shape: [16, 1]
  K1: 15
  down_mtr: 3
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.10
  c_cross_down: 0.10
  snr_db: 18
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

rate_plan:
  target_total_rate: 0.90
  sector_bits: 32768
  sector_count_target: 1
  exact_ldpc_rate: true
  check_codebook: true

channel_metrics:
  use_ldpc_inner_grid: true
  sample_frames: 256
  chunk_tracks: 256

ldpc:
  n: 1800
  dv: 3
  dc: 75
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  sector_bits: 32768
  sector_count_target: 1
  inner_demapper: hard_codebook
  turbo_iterations: 0
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64
  channel_detector: soft_awgn

sweep:
  snr_db: [18]
  iti_coeffs: [0.0, 0.2]
