# High-rate 4KB-sector FSR waterfall scan for the 1D-MTR K15 baseline, nominal ITI=0.2.
#
# This is intentionally broad because the 1D code has no cross-track constraint.
# Run on the Windows machine:
#   tdmr2d concat configs/concat_ldpc_1dmtr_highrate_k15_sector_snrscan_iti02.yaml
experiment:
  name: highrate_1dmtr_k15_snrscan_iti02_500sector
  family: mtr1d
  seed: 0
  num_tracks: 40
  bits_per_track: 2048

code:
  type: mtr1d
  block_shape: [16, 1]
  K1: 15
  down_mtr: 3
  boundary_down_mtr: 8
  boundary_max_checker_run: 8

channel:
  model: linear_2d_awgn
  c0: 1.0
  c_down_prev: 0.15
  c_down_next: 0.15
  c_cross_up: 0.20
  c_cross_down: 0.20
  snr_db: 26
  boundary: zero

detector:
  type: soft_awgn
  threshold: 0.0
  llr_clip: 20.0

metrics:
  target_ber: 1.0e-2

output:
  dir: outputs/runs

rate_plan:
  target_total_rate: 0.90
  sector_bits: 32768
  sector_count_target: 500
  exact_ldpc_rate: false
  check_codebook: true

channel_metrics:
  use_ldpc_inner_grid: true
  sample_frames: 256
  chunk_tracks: 256

ldpc:
  n: 1800
  dv: 3
  dc: 75
  construction_seed: 1
  method: minsum
  scale: 0.75
  max_iters: 30
  sector_bits: 32768
  sector_count_target: 500
  inner_demapper: hard_codebook
  turbo_iterations: 0
  turbo_llr_clip: 20.0
  turbo_damping: 0.0
  demapper_chunk: 64
  channel_detector: soft_awgn

sweep:
  snr_db: [20, 22, 24, 26, 28, 30, 32, 34]
  iti_coeffs: [0.2]
